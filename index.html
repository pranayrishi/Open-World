<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open World Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
      }
      canvas {
        display: block;
      }
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        color: #fff;
        z-index: 1000;
      }
      #loading h1 {
        font-size: 2rem;
        margin-bottom: 1rem;
      }
      #loading-bar {
        width: 200px;
        height: 4px;
        background: #333;
        border-radius: 2px;
        overflow: hidden;
      }
      #loading-fill {
        height: 100%;
        background: #4a9eff;
        width: 0%;
        transition: width 0.3s;
      }
      #controls-hint {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.6);
        padding: 10px 20px;
        border-radius: 8px;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.5s;
      }
      #controls-hint.visible {
        opacity: 1;
      }
      #stats {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 12px;
        border-radius: 4px;
        color: #0f0;
        font-family: monospace;
        font-size: 12px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <h1>Loading...</h1>
      <div id="loading-bar"><div id="loading-fill"></div></div>
    </div>
    <div id="controls-hint">
      WASD: Move | Mouse: Look | Shift: Run | Space: Jump | Click to capture
      mouse
    </div>
    <div id="stats">FPS: -- | Draws: -- | Tris: --</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
